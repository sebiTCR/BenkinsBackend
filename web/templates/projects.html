<!DOCTYPE HTML>
<HTML xmlns="http://www.w3.org/1999/html">
    <head>
        <link rel="stylesheet" href="../static/modern.css"/>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    </head>
    <body>
        <h1>Projects</h1>
        <br>

        <div class="project_container">
            {% for project in projects%}
            <div class="project_entry flex justify-around">
                <div class="flex flex-col">
                    <p><b> {{project.name}} </b></p>
                    <p class="text-[#EFF8E25a]"><b> {{project.path}} </b></p>
                </div>

                <StatusCode status={{project.status}}/>


<!--                Download option-->
                <div class="flex flex-col">
                    <h1><b>Builds</b></h1>
                    <select>
                        {%for build in project.builds%}
                            <option>{{build.version}}</option>
                        {%endfor%}
                    </select>
                </div>

                <div class="flex flex-col">
                    <button onclick="alert('building')">Build</button>
                    <button onclick="redirect('/home')">Download</button>
                </div>
            </div>
            {% endfor %}

            <button class="create_button">Create new project</button>
        </div>
    </body>
</HTML>
